<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Földrajz 🌍 — Interaktív Feladatok</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --grass: #22c55e;
            --purple: #a855f7;
            --blue: #38bdf8;
            --text: #f0f0f8;
            --card-bg: rgba(30, 30, 50, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: #0a0a14;
            color: var(--text);
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a14 100%);
        }

        .bg-deco, .bg-emoji-deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .particle { position: fixed; border-radius: 50%; opacity: 0.5; animation: float linear infinite; }
        @keyframes float { from { transform: translateY(100vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }

        #app { position: relative; z-index: 10; width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 20px; text-align: center; }

        header { margin-bottom: 60px; animation: fadeInDown 0.8s ease-out; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
        .logo-icon { width: 48px; height: 48px; color: var(--grass); filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.5)); }
        h1 { font-family: 'DM Serif Display', serif; font-size: 3.5rem; letter-spacing: -2px; line-height: 1; }
        h1 span.green { color: var(--grass); }
        h1 span.purple { color: var(--purple); }
        .subheader { font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.3em; opacity: 0.6; text-transform: uppercase; }

        /* Topic Grid */
        .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .topic-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .topic-card:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .topic-card.fuves { --theme: var(--grass); }
        .topic-card.fold { --theme: var(--purple); }
        .topic-card.vizek { --theme: var(--blue); }
        .topic-card::before {
            content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, var(--theme), transparent 60%); opacity: 0.1; transition: opacity 0.4s;
        }
        .topic-card:hover::before { opacity: 0.2; }

        .topic-icon { font-size: 3rem; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--theme)); }
        .topic-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 12px; color: #fff; }
        .topic-meta { font-size: 0.85rem; opacity: 0.6; }
        .topic-progress-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 20px; }
        .topic-progress-fill { height: 100%; background: var(--theme); border-radius: 3px; box-shadow: 0 0 10px var(--theme); }

        /* UI Elements (Subtopics, Modes, Game) - Simplified for Single File */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 40px; backdrop-filter: blur(12px); max-width: 800px; margin: 0 auto; animation: scaleUp 0.5s ease-out; }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        button { cursor: pointer; transition: 0.2s; border: none; font-family: inherit; }
        .back-btn { background: transparent; color: #fff; padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); margin-top: 30px; font-weight: 600; }
        .back-btn:hover { background: rgba(255,255,255,0.1); }

        /* Game UI */
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; gap: 10px; }
        .stats-wrap { display: flex; gap: 10px; align-items: center; }
        .stat-item { background: rgba(255,255,255,0.05); padding: 6px 15px; border-radius: 50px; border: 1px solid var(--border); font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .stat-item.score { color: #facc15; }
        .stat-item.streak { color: #f97316; }
        .stat-item.timer { color: #38bdf8; }
        
        .progress-container { flex-grow: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 0 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--grass); transition: width 0.3s ease; box-shadow: 0 0 10px var(--grass); }

        .note-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; transition: 0.2s; }
        .note-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        .ans-btn { width: 100%; padding: 20px; margin: 10px 0; border-radius: 16px; font-size: 1.1rem; font-weight: 600; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); text-align: left; transition: 0.2s; }
        .ans-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); transform: translateX(5px); }
        .selected-correct { background: rgba(34, 197, 94, 0.2) !important; border-color: var(--grass) !important; }
        .selected-wrong { background: rgba(244, 63, 94, 0.2) !important; border-color: #f43f5e !important; }

        /* Tananyag Overlay */
        .tananyag-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .tananyag-overlay.open { display: flex; }
        .tananyag-panel { background: #1a1a2e; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; border-radius: 24px; border: 1px solid var(--border); padding: 40px; position: relative; }
        .tananyag-close { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; background: transparent; color: #fff; opacity: 0.5; }

        /* Toast */
        #cubeToast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #7c3aed; color: #fff; padding: 12px 24px; border-radius: 50px; transition: transform 0.4s; z-index: 99999; }
        #cubeToast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="bg-deco" id="bgDeco"></div>
    <div class="bg-emoji-deco" id="bgEmojiDeco"></div>
    <div id="cubeToast"></div>
    
    <div id="app">
        <header id="mainHeader">
            <div class="logo-wrap">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21,3c-3,0-8.5,1.5-13,5.5C3.5,12.5,2,18,2,18s5.5-1.5,9.5-6c4-4.5,5.5-10,5.5-10l3,3c0,0-5.5,1.5-10,5.5 c-4.5,4-6,9.5-6,9.5s5.5-1.5,9.5-6c4-4.5,5.5-10,5.5-10L21,3z"/>
                </svg>
                <h1><span class="green">Föld</span><span class="purple">rajz</span></h1>
            </div>
            <p class="subheader">7–8. ÉVFOLYAM · INTERAKTÍV FELADATOK</p>
        </header>
        <div id="gameArea"></div>
    </div>

    <!-- Modals -->
    <div class="tananyag-overlay" id="tananyagOverlay" onclick="closeTananyagOnBg(event)">
        <div class="tananyag-panel">
            <button class="tananyag-close" onclick="closeTananyag()">✕</button>
            <div id="tananyagBody"></div>
        </div>
    </div>

        const BIG_TOPICS = [
            {

                            <div class="stat-item score">🌟 <span>${score}</span></div>
                            <div class="stat-item streak">🔥 <span>${streak}</span></div>
                            <div class="stat-item timer">⏱️ <span id="gameTimer">${elapsedSeconds} mp</span></div>
                            <button class="note-btn" onclick="openTananyag()">📖</button>
                        </div>
                    </div>
                    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 25px; margin-bottom: 20px;">
                        <p style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 10px;">📄 ${current+1}. kérdés — fdfs</p>
                        <h3 style="line-height: 1.4;">${q.text}</h3>
                    </div>
                    ${ansHTML}
                    <div id="feedback" style="margin-top: 20px; font-weight: 600; min-height: 24px;"></div>
                    <button class="back-btn" id="nextBtn" style="display:none; width: 100%; border-color: var(--grass); color: var(--grass); background: rgba(34, 197, 94, 0.1);" onclick="next()">Következő kérdés ➡️</button>
                </div>`;
            
            // Start UI timer update
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
                const timerEl = document.getElementById('gameTimer');
                if(timerEl) timerEl.innerText = elapsedSeconds + " mp";
            }, 1000);
        }

        function checkTF(val) {
            if(answered) return; answered = true;
            const q = shuffledQuestions[current];
            const correct = val === q.answer;
            if(correct) {
                score++;
                streak++;
                if(streak > bestStreak) bestStreak = streak;
                document.getElementById(val ? 'btnTrue' : 'btnFalse').classList.add('selected-correct');
            } else {
                streak = 0;
                document.getElementById(val ? 'btnTrue' : 'btnFalse').classList.add('selected-wrong');
                document.getElementById(q.answer ? 'btnTrue' : 'btnFalse').classList.add('selected-correct');
            }
            document.getElementById('feedback').textContent = correct ? "✅ Helyes! " + q.explain : "❌ Nem egészen. " + q.explain;
            document.getElementById('nextBtn').style.display = 'block';
        }

        function checkQuiz(i) {
            if(answered) return; answered = true;
            const q = shuffledQuestions[current];
            const correct = i === q.correct;
            if(correct) {
                score++;
                streak++;
                if(streak > bestStreak) bestStreak = streak;
                document.getElementById('opt'+i).classList.add('selected-correct');
            } else {
                streak = 0;
                document.getElementById('opt'+i).classList.add('selected-wrong');
                document.getElementById('opt'+q.correct).classList.add('selected-correct');
            }
            // Disable all buttons
            q.opts.forEach((_, idx) => {
                const btn = document.getElementById('opt'+idx);
                if(btn) btn.disabled = true;
            });
            document.getElementById('feedback').textContent = correct ? "✅ Helyes! " + q.explain : "❌ Nem egészen. " + q.explain;
            document.getElementById('nextBtn').style.display = 'block';
        }

        function next() { current++; answered = false; render(); }

        function showResults() {
            clearInterval(timerInterval);
            document.getElementById('gameArea').innerHTML = `
                <div class="card">
                    <h1>Kész! 🏆</h1>
                    <h2 style="margin: 20px 0;">${score} / ${shuffledQuestions.length} helyes válasz</h2>
                    <button class="back-btn" onclick="showBigTopics()">🏠 Főmenü</button>
                </div>`;
        }

        function openTananyag() {
            const overlay = document.getElementById('tananyagOverlay');
            const body = document.getElementById('tananyagBody');
            
            let conceptHTML = '';
            if (currentTopic.concepts) {
                conceptHTML = `
                    <p style="color: #eab308; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.1em; margin-top: 30px; margin-bottom: 20px;">🔑 FONTOS FOGALMAK</p>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
                        ${currentTopic.concepts.map(c => `
                            <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; border-left: 4px solid var(--grass);">
                                <div style="color: var(--grass); font-weight: 700; font-size: 0.9rem; margin-bottom: 5px;">${c.t}</div>
                                <div style="font-size: 0.8rem; opacity: 0.8;">${c.d}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            body.innerHTML = `
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="font-family: 'DM Serif Display'; font-size: 1.8rem; margin-bottom: 5px;">
                        ${currentTopic.icon} ${currentTopic.title}
                    </h2>
                    <p style="opacity: 0.5; font-size: 0.7rem; letter-spacing: 0.1em;">OLVASD EL, MAJD INDÍTSD EL A FELADATOT!</p>
                </div>
                
                <hr style="opacity: 0.1; margin-bottom: 20px;">
                
                <p style="color: var(--grass); font-weight: 700; font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 15px;">📝 ÖSSZEFOGLALÓ</p>
                <div style="line-height: 1.6; color: #cbd5e1; text-align: justify; font-size: 0.95rem;">
                    ${currentTopic.summary || currentTopic.note || '<p>Ehhez a témakörhöz még nem készült el a részletes tananyag.</p>'}
                </div>

                ${conceptHTML}

                <div style="text-align: center; margin-top: 40px;">
                    <button class="ans-btn" style="border-color: var(--grass); display: inline-block; width: auto; padding: 15px 40px;" onclick="closeTananyag()">Értem, mehet a játék! 🚀</button>
                </div>
            `;
            overlay.classList.add('open');
        }

        function closeTananyag() {
            document.getElementById('tananyagOverlay').classList.remove('open');
        }

        function closeTananyagOnBg(e) {
            if(e.target.id === 'tananyagOverlay') closeTananyag();
        }

        // Particle Theme System
        const THEMES = {
            fuves: { color: '#22c55e', particles: 20, emoji: '🌿' },
            vizek: { color: '#38bdf8', particles: 25, emoji: '💧' },
            fold: { color: '#a855f7', particles: 20, emoji: '✨' }
        };

        function applyTheme(id) {
            const deco = document.getElementById('bgDeco');
            const edeco = document.getElementById('bgEmojiDeco');
            deco.innerHTML = ''; edeco.innerHTML = '';
            const t = THEMES[id] || { color: '#4f46e5', particles: 15, emoji: '✨' };
            const colors = [t.color, '#ffffff', '#7c3aed'];
            for(let i=0; i<t.particles; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const sz = Math.random() * 4 + 2;
                p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*3)]};animation-duration:${5+Math.random()*10}s;animation-delay:${Math.random()*5}s;`;
                deco.appendChild(p);
            }
        }

        showBigTopics();
    </script>
</body>
</html
